services:
  - type: web
    name: test-django-app
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "cd config && gunicorn config.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.13
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: test-django-db
          property: connectionString

databases:
  - name: test-django-db
    plan: free
